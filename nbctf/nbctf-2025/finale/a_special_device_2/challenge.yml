name: "A special device 2/3"
author: "Philippe_Katerine"

category: "Hardware"

# Markdown friendly
description: |-
    Maintenant que vous savez comment brancher une puce SPI et un adaptateur USB-TTL pour intéragir avec un device via un shell uart, corsons un peu les choses. 
    Le device est à présent protégé par un mdp, mais le développeur est vraiment nul et utilise micropython pour programmer son device.. cela ne devrait pas être très compliqué à reverser. 
    Grâce à esptool, vous avez obtenu un dump de la mémoire flash du device : à vous de jouer pour récuperer le flag! 

    Auteur : Philippe_Katerine

# Do not touch
