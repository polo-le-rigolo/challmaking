name: "A special device 1/3"
author: "Philippe_Katerine"

category: "Hardware"


# Markdown friendly
description: |-
    Votre mission est de récupérer un accès sur un appareil IoT. Vous ne savez pas grand-chose sur la provenance de l’équipement. En le démontant, vous constatez qu’il est constitué de deux circuits imprimés distincts sur lesquels vous pouvez lire respectivement « ESP32-WROOM » et « Winbond 25Q16 ». Le premier circuit est le microcontrôleur et le second, une puce mémoire externe.

    En le découpant à la Dremel comme un bourrin, vous avez malheureusement sectionné les liaisons entre la puce mémoire et le microcontrôleur… Grâce aux pinouts des deux puces (fichiers fournis), vous devez rebrancher la mémoire flash à l’ESP sur son interface SPI0.

    Si votre liaison est correcte, et que vous avez correctement branché votre adaptateur USB–UART vers TTL, vous pouvez essayer de booter le device et voir s’il vous parle ! Attention également au baud rate : vous devez tous les deux parler à la même vitesse pour vous comprendre

    Auteur : Philippe_Katerine

