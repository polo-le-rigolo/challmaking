logLevel: info

paths:
  botnet-cam-fr-relay-03:
    runOnInit: >
      ffmpeg -hide_banner -loglevel warning
      -re -stream_loop -1 -i /video.mp4
      -c copy -f rtsp
      rtsp://admin:SuperSecurePassword123456@localhost:8554/botnet-cam-fr-relay-03
    runOnInitRestart: yes

authMethod: internal

authInternalUsers:
  - user: admin
    pass: SuperSecurePassword123456
    permissions:
      - action: publish
      - action: read
