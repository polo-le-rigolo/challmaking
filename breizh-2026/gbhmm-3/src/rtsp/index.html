<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>C2 Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
    }

    header {
      padding: 20px;
      background: #111826;
      border-bottom: 1px solid #222;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 20px;
    }

    .card {
      background: #151c28;
      border: 1px solid #2a3446;
      border-radius: 10px;
      padding: 14px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
      border-color: #3a4b66;
    }

    .name {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status {
      font-size: 13px;
      margin-bottom: 10px;
    }

    .offline { color: #ff4d4d; }
    .online { color: #4dff88; }

    button {
      background: #2b5cff;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #1f45cc;
    }
  </style>
</head>

<body>

<header>
  <h1>C2 Control Panel</h1>
</header>

<div class="grid" id="grid"></div>

<script>
const cameras = Array.from({length: 12}, (_, i) => ({
  id: i + 1,
  name: `fr-relay-${String(i + 1).padStart(2, '0')}`,
  online: i === 2 
}));

function queryDevice(cam) {
  if (!cam.online) {
    alert("device beacon not connected to the botnet");
  } else {
    alert(
      "device beacon already connected, rtsp stream connected and loaded from rtsp_config.xml file.\n\n" +
      "Something interesting might be waiting for you on the video stream of the camera :p you are almost there my friend."
    );
  }
}

document.getElementById("grid").innerHTML = cameras.map(c => `
  <div class="card">
    <div class="name">${c.name}</div>

    <div class="status ${c.online ? "online":"offline"}">
      ${c.online ? "ONLINE" : "OFFLINE"}
    </div>

    <button onclick='queryDevice(${JSON.stringify(c)})'>
      Query device
    </button>
  </div>
`).join("");
</script>

</body>
</html>
