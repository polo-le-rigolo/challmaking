name: "Zzz Zzz Zzz"
author: "Philippe_Katerine"
category: Hardware
description: |-
    ![jour-nuit](https://media.tenor.com/zn-7vRPZu8EAAAAC/jour-nuit.gif)

    L'ampoule connectée de ma chambre se met à changer de luminosité toute seule depuis que j'ai fait la mise à jour du firmware.

    Je suis peut-être fou… mais j'ai l'impression que l'ampoule essaie de me parler.

    J'ai fait une capture du réseau domotique : aidez-moi à la déchiffrer et à décoder le message caché pour obtenir le flag.

    > Nos informateurs rapportent que la **fin du flag est tronquée et fini par `Encoding}`**.

    Auteur : [Philippe_Katerine](https://discord.com/users/403981878647980032)

attribution: 'Auteur : [Philippe_Katerine](https://discord.com/users/403981878647980032)'


