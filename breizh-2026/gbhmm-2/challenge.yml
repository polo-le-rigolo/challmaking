name: "Glitch Better Have My Money [2/3]"
author: "Philippe_Katerine"
category: Hardware
description: |-
    ![uart](https://media.tenor.com/Tu2DTygIOhAAAAAd/flipper-zero-gpio-gpio-flipper.gif)

    Malheureusement, le debug UART semble désactivé par le firmware lors du boot.
    Votre objectif est de glitcher le CPU de la caméra pour obtenir un accès UART.
    Attention, la réussite du glitch est parfois perturbée par des phénomènes physique (ainsi, des répétitions peuvent-être nécessaires).

    > Note : Une fois le glitch réussi, utilisez le port `1337/TCP` de l'instance pour accéder à l'UART.

    Auteur : [Philippe_Katerine](https://discord.com/users/403981878647980032)

